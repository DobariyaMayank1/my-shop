<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search – My Shop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f7f8fa; color: #1a1a1a; }

        .header {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 28px; height: 64px;
            background: #fff; border-bottom: 1px solid #e5e7eb;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .logo { font-size: 22px; font-weight: 800; color: #ff6600; letter-spacing: -0.5px; }
        .searchbar { flex: 1; display: flex; justify-content: center; padding: 0 24px; }
        .searchbar input {
            width: 100%; max-width: 480px; padding: 9px 16px;
            border: 1px solid #ddd; border-radius: 24px; font-size: 14px;
            outline: none; background: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .searchbar input:focus { border-color: #ff6600; box-shadow: 0 0 0 3px rgba(255,102,0,0.12); }
        .header-right { display: flex; align-items: center; gap: 20px; }
        .header-right a { text-decoration: none; color: #444; font-size: 14px; font-weight: 500; transition: color 0.2s; }
        .header-right a:hover { color: #ff6600; }

        .layout { display: flex; height: calc(100vh - 64px); }

        .sidebar {
            width: 220px; flex-shrink: 0;
            background: #fff; border-right: 1px solid #e5e7eb;
            display: flex; flex-direction: column; padding: 16px 12px;
        }
        .sidebar .top { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .sidebar .nav-item {
            padding: 10px 14px; border-radius: 8px;
            font-size: 14px; font-weight: 500; color: #444;
            cursor: pointer; transition: background 0.15s, color 0.15s;
        }
        .sidebar .nav-item:hover { background: #fff4ee; color: #ff6600; }
        .sidebar .logout-btn {
            margin-top: 12px; padding: 10px 14px;
            background: #ff4d4d; color: #fff; border-radius: 8px;
            font-size: 14px; font-weight: 600; text-align: center; cursor: pointer;
            transition: background 0.2s;
        }
        .sidebar .logout-btn:hover { background: #e03c3c; }

        .main { flex: 1; padding: 28px; overflow-y: auto; }
        .main h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .search-hint { font-size: 14px; color: #888; margin-bottom: 20px; }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: #fff; border: 1px solid #e5e7eb;
            border-radius: 12px; overflow: hidden;
            display: flex; flex-direction: column;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .product-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.10); transform: translateY(-2px); }
        .product-card img { width: 100%; height: 220px; object-fit: cover; }
        .product-card .card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .product-card .card-body p { font-size: 13px; color: #555; line-height: 1.4; }
        .product-card .card-body p strong { color: #1a1a1a; }
        .like-checkbox { accent-color: #ff6600; width: 16px; height: 16px; cursor: pointer; margin-top: 8px; }
        .buybutton { padding: 14px; }
        .buybutton a {
            display: block; text-align: center; padding: 9px 0;
            background: #ff6600; color: #fff; border-radius: 8px;
            font-size: 14px; font-weight: 600; text-decoration: none;
            transition: background 0.2s;
        }
        .buybutton a:hover { background: #e05500; }

        .empty-state { text-align: center; padding: 60px 20px; color: #888; font-size: 16px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">My Shop</div>
        <div class="searchbar">
            <input type="text" id="search" placeholder="Type to search products..." autofocus>
        </div>
        <div class="header-right">
            <a href="/favorite">❤ Favorite</a>
            <a href="/profile">👤 Profile</a>
            <a href="/logout">Logout</a>
        </div>
    </div>

    <div class="layout">
        <div class="sidebar">
            <div class="top">
                <div class="nav-item" id="sidebar-home">🏠 Home</div>
                <div class="nav-item" id="sidebar-favorite">❤ Favorite</div>
                <div class="nav-item" id="sidebar-profile">👤 Profile</div>
                {% if user.user_type == 's' %}
                <div class="nav-item" id="sidebar-myproduct">📦 My Products</div>
                {% endif %}
                {% if user.user_type == 'admin' %}
                <div class="nav-item" id="sidebar-dashboard">⚙ Admin Dashboard</div>
                {% endif %}
                <div class="nav-item" id="sidebar-filter">🔍 Filter</div>
            </div>
            <div class="logout-btn" id="sidebar-logout">Logout</div>
        </div>

        <div class="main">
            <h2>Search Products</h2>
            <p class="search-hint">Start typing in the search bar above to find products.</p>
            <div class="products" id="products"></div>
        </div>
    </div>

    <script>
        document.getElementById('sidebar-home').addEventListener('click', () => window.location.href = '/home');
        document.getElementById('sidebar-favorite').addEventListener('click', () => window.location.href = '/favorite');
        document.getElementById('sidebar-profile').addEventListener('click', () => window.location.href = '/profile');
        document.getElementById('sidebar-logout').addEventListener('click', () => window.location.href = '/logout');
        document.getElementById('sidebar-filter').addEventListener('click', () => window.location.href = '/filter');

        const myproductbtn = document.getElementById('sidebar-myproduct');
        if (myproductbtn) myproductbtn.addEventListener('click', () => window.location.href = '/myproduct');

        const admindashboardbtn = document.getElementById('sidebar-dashboard');
        if (admindashboardbtn) admindashboardbtn.addEventListener('click', () => window.location.href = '/admin');
    </script>

    <script id="products-data" type="application/json">{{ products_json | tojson }}</script>
    <script id="likes-data" type="application/json">{{ liked_products | tojson }}</script>

    <script>
        const allProducts = JSON.parse(document.getElementById('products-data').textContent);
        let likedProducts = JSON.parse(document.getElementById('likes-data').textContent);
        const container = document.getElementById('products');
        const searchInput = document.getElementById('search');

        function buildCard(p) {
            const isChecked = likedProducts.includes(p.id) ? 'checked' : '';
            return `
                <div class="product-card">
                    <img src="/static/uploads/${p.image}" alt="${p.name}">
                    <div class="card-body">
                        <p><strong>${p.name}</strong></p>
                        <p>₹${p.price}</p>
                        <p>${p.details}</p>
                        <p>${p.category} · ${p.gender}</p>
                        <p>Stock: ${p.stock}</p>
                        <p style="font-size:11px;color:#aaa;">ID: ${p.id} · Seller: ${p.sellerId}</p>
                        <input type="checkbox" class="like-checkbox" data-product-id="${p.id}" ${isChecked}>
                    </div>
                    <div class="buybutton"><a href="/buy/${p.id}">Buy Now</a></div>
                </div>`;
        }

        function renderProducts(list) {
            container.innerHTML = list.length ? list.map(buildCard).join('') : '<div class="empty-state">No products found.</div>';
        }

        renderProducts(allProducts);

        searchInput.addEventListener('keyup', () => {
            const q = searchInput.value.toLowerCase().trim();
            renderProducts(q ? allProducts.filter(p => p.name.toLowerCase().includes(q)) : allProducts);
        });

        document.addEventListener('change', function (e) {
            if (!e.target.classList.contains('like-checkbox')) return;
            const productId = parseInt(e.target.dataset.productId);
            const liked = e.target.checked;
            fetch('/like', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ product_id: productId, liked })
            })
            .then(res => res.json())
            .then(() => fetch('/liked-products'))
            .then(res => res.json())
            .then(data => { likedProducts = data; })
            .catch(console.error);
        });
    </script>

</body>
</html>
