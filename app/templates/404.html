<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 – Page Not Found</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh; background: #f7f8fa;
            font-family: 'Segoe UI', sans-serif;
            display: flex; align-items: center; justify-content: center;
        }

        .error-card {
            background: #fff; border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            padding: 56px 48px; text-align: center;
            max-width: 440px; width: 100%;
        }

        .error-icon { font-size: 72px; margin-bottom: 20px; }

        .error-card h1 {
            font-size: 72px; font-weight: 900; color: #ff6600;
            line-height: 1; margin-bottom: 8px;
        }

        .error-card h2 {
            font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 12px;
        }

        .error-card p {
            font-size: 15px; color: #666; margin-bottom: 32px; line-height: 1.6;
        }

        .btn-home {
            display: inline-block; padding: 12px 28px;
            background: #ff6600; color: #fff; border-radius: 10px;
            font-size: 15px; font-weight: 600; text-decoration: none;
            transition: background 0.2s;
        }
        .btn-home:hover { background: #e05500; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">🔍</div>
        <h1>404</h1>
        <h2>Page not found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="{{ url_for('home.main') }}" class="btn-home">Go to Home</a>
    </div>
</body>
</html>
