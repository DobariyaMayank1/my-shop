<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification – My Shop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
        }

        .auth-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .otp-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .auth-card h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .auth-card .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            letter-spacing: 4px;
            text-align: center;
            color: #1a1a1a;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus { border-color: #ff6600; }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #ff6600;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover { background: #e05500; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="otp-icon">📧</div>
        <h2>Enter OTP</h2>
        <p class="subtitle">We've sent a one-time password to your email. Enter it below to continue.</p>

        <form method="post" enctype="multipart/form-data">
            {{ form.hidden_tag() }}

            <div class="form-group">
                {{ form.otp.label }}
                {{ form.otp(placeholder="------") }}
            </div>

            {{ form.submit(class="btn-primary") }}
        </form>
    </div>
</body>
</html>
